# https://blog.benoitblanchon.fr/github-action-run-ssh-commands/
name: 04_simple_deploy_with_built_in_ssh
on:
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy to Demo 1
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/demo_3.key
          chmod 600 ~/.ssh/demo_3.key
          cat >>~/.ssh/config <<END
            Host demo_3
            HostName ${{ secrets.HOST }}
            User demo_3
            IdentityFile ~/.ssh/demo_3.key
            StrictHostKeyChecking no
          END
        env:
          SSH_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Deploy
        run: ssh demo_3 '/usr/local/bin/devops/deploy/deploy.sh demo_3'
